---
# tasks file for install_agent
- name: "Gather facts"
  ansible.builtin.setup:
  when: ansible_facts.distribution is not defined

- name: "Preflight check: Fail when OS is unknown"
  ansible.builtin.fail:
    msg: "The package management system on this system is unknown. This can happen if the role runs on an unsupported os."
  when: install_agent_pkg_format == 'unknown'

- name: "Linux: Install python bindings for package managers"
  ansible.builtin.package:
    name: "{{ 'python3-rpm' if ansible_facts.os_family == 'Suse' else 'python-apt-common' }}"
  become: true
  when: ansible_facts.os_family == 'Suse' or ansible_facts.os_family == 'Debian'

- name: "Linux: Gather package facts"
  ansible.builtin.package_facts:
  when: ansible_facts.packages is not defined and install_agent_custom_os_family == 'Linux'

- name: "Windows: Check if SentinelOne is already installed"
  ansible.windows.win_service_info:
    name: SentinelAgent
  register: install_agent_sentinelagent_service
  when: install_agent_custom_os_family == 'Windows'

- name: "Set fact: install_agent_agent_installed"
  ansible.builtin.set_fact:
    install_agent_agent_installed: "{{ true if ansible_facts.packages.sentinelagent is defined or ansible_facts.packages.SentinelAgent is defined
      or install_agent_sentinelagent_service.exists | default(false) else false }}"

- name: "Download agent to localhost from SentinelOne. Version: {{ install_agent_agent_version }}"
  sva.sentinelone.sentinelone_download_agent:
    console_url: "{{ install_agent_console_url }}"
    token: "{{ install_agent_api_token }}"
    site: "{{ install_agent_site }}"
    os_type: "{{ install_agent_custom_os_family }}"
    packet_format: "{{ install_agent_pkg_format }}"
    architecture: "{{ install_agent_pkg_arch }}"
    agent_version: "{{ install_agent_agent_version }}"
    custom_version: "{{ install_agent_custom_version | default(omit) }}"
  register: install_agent_return_download_agent
  delegate_to: localhost
  throttle: 1
  tags:
    - download_client_from_sentinel_one
  when: '(not install_agent_agent_installed) and (install_agent_linux_custom_client_url | length == 0)'

- name: "Download agent to localhost from custom source."
  tags:
    - download_client_from_custom_url
  when: '(not install_agent_agent_installed) and (install_agent_linux_custom_client_url | length > 0)'
  block:
    - name: "Client Custom Source: Download custom installation package"
      ansible.builtin.get_url:
        url: "{{ install_agent_linux_custom_client_url }}"
        dest: "{{ tmp_dir }}"
        mode: '0644'
      register: install_agent_return_download_package

    - name: "Client Custom Source: Set path from downloaded agent to variable"
      ansible.builtin.set_fact:
        install_agent_return_download_agent:
          original_message:
            full_path: "{{ install_agent_return_download_package.dest }}"
            filename: "{{ install_agent_return_download_package.dest | basename }}"

- name: "Block: Get registration token from API"
  run_once: true
  tags:
    - sentinelone_install_agent_get_registration_token
  block:
    - name: "Get siteid"
      ansible.builtin.uri:
        url: "{{ install_agent_api_url }}sites?name={{ install_agent_api_url | urlencode }}&state=active"
        method: GET
        return_content: true
        headers:
          Accept: application/json
          Authorization: "APIToken {{ install_agent_api_token }}"
        validate_certs: true
        status_code: 200
      register: install_agent_siteobj
      delegate_to: localhost
      no_log: "{{ install_agent_hide_sensitive }}"
      until: ((install_agent_siteobj.json.data.sites | length) > 0) and (install_agent_siteobj.status == 200)
      retries: 3
      delay: 20

    - name: "Extract site id"
      ansible.builtin.set_fact:
        install_agent_siteid: "{{ install_agent_siteobj.json.data.sites[0].id }}"

    - name: "Get group id"
      ansible.builtin.uri:
        url: "{{ install_agent_api_url }}groups?name={{ install_agent_group | urlencode }}&siteIds={{ install_agent_siteid }}"
        method: GET
        return_content: true
        headers:
          Accept: application/json
          Authorization: "APIToken {{ install_agent_api_token }}"
        validate_certs: true
        status_code: 200
      register: install_agent_groupobj
      delegate_to: localhost
      no_log: "{{ install_agent_hide_sensitive }}"
      until: ((install_agent_groupobj.json.data | length) > 0) and (install_agent_groupobj.status == 200)
      retries: 3
      delay: 20
      when: install_agent_group is defined

    - name: "Extract groupid"
      ansible.builtin.set_fact:
        install_agent_groupid: "{{ install_agent_groupobj.json.data[0].id }}"
      when: install_agent_group is defined

    - name: "Set endpoint URI to get the correct registration token"
      ansible.builtin.set_fact:
        install_agent_reg_token_uri: "{{ \"groups/{{ install_agent_groupid }}/token\" if
          install_agent_group is defined else \"sites/{{ install_agent_siteid }}/token\" }}"

    - name: "Get registration token"
      ansible.builtin.uri:
        url: "{{ install_agent_api_url }}{{ install_agent_reg_token_uri }}"
        method: GET
        return_content: true
        headers:
          Accept: application/json
          Authorization: "APIToken {{ install_agent_api_token }}"
        validate_certs: true
        status_code: 200
      register: install_agent_reg_token_obj
      delegate_to: localhost
      no_log: "{{ install_agent_hide_sensitive }}"
      until: install_agent_reg_token_obj.status == 200
      retries: 3
      delay: 20

- name: "Include tasks for: {{ install_agent_custom_os_family }}"
  ansible.builtin.include_tasks: "{{ install_agent_custom_os_family }}.yml"

- name: "Remove agent install package from localhost"
  ansible.builtin.file:
    path: "{{ install_agent_return_download_agent.original_message.full_path }}"
    state: absent
  delegate_to: localhost
  when: not install_agent_agent_installed

- name: "Fail if new client does not appear in management console"
  tags:
    - sentinelone_install_agent_mgmt_console_client_verification
  ansible.builtin.uri:
    url: "{{ install_agent_api_url }}agents?siteIds={{ install_agent_siteid }}&computerName={{ ansible_hostname | urlencode }}&isActive=true"
    method: GET
    return_content: true
    headers:
      Accept: application/json
      Authorization: "APIToken {{ install_agent_api_token }}"
    validate_certs: true
    status_code: 200
  register: install_agent_registrationstatus
  delegate_to: localhost
  no_log: "{{ install_agent_hide_sensitive }}"
  until: ((install_agent_registrationstatus.json.data | length) > 0) and (install_agent_registrationstatus.status == 200)
  retries: "{{ install_agent_check_console_retries }}"
  delay: "{{ install_agent_check_console_retry_delay }}"
