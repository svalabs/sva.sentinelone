---
- name: "Linux: Include Linux.yml vars"
  ansible.builtin.include_vars:
    file: Linux.yml

- name: "Linux Block: Skip if sentinelagent is already installed."
  when: not install_agent_agent_installed
  become: true
  block:
    - name: Get dmesg output
      ansible.builtin.command: dmesg
      changed_when: false
      register: install_agent_dmesg_output

    - name: Assert that no function tracing issues occured
      ansible.builtin.assert:
        that:
          - "'FUNCTION TRACING IS CORRUPTED' not in install_agent_dmesg_output.stdout"
        fail_msg: 'System instability detected, function tracing seems corrupted'

    - name: "Linux: Copy agent package to remote server"
      ansible.builtin.copy:
        src: "{{ install_agent_return_download_agent.original_message.full_path }}"
        dest: "{{ install_agent_remote_pkg_path }}"
        mode: "0644"

    - name: "Block: RPM based systems"
      when: install_agent_pkg_format == "rpm"
      block:
        - name: "Linux: Copy GPG key to remote server (RPM)"
          ansible.builtin.copy:
            src: "{{ install_agent_gpg_key }}"
            dest: "{{ install_agent_remote_gpg_key_path }}"
            mode: "0644"
          when: install_agent_signed_package

        # Workaround for RHEL 10. Wait until fix in https://github.com/ansible/ansible/pull/86237 is
        # backported in all supported ansible releases to go back to rpm_key module
        - name: "Linux: Try importing RPM GPG key"
          ansible.builtin.command:
            cmd: "rpm -i {{ install_agent_remote_gpg_key_path }}"
          register: install_agent_rpm_import
          changed_when: install_agent_rpm_import.rc == 0
          failed_when: install_agent_signed_package and install_agent_rpm_import.rc != 0
          when: install_agent_signed_package

        - name: "Linux: Install unsigned .rpm agent package via rpm"
          ansible.builtin.command:
            cmd: "rpm -i --nodigest {{ install_agent_remote_pkg_path }}"
            creates: "/opt/sentinelone/bin/sentinelctl"
          when: not install_agent_signed_package

        - name: "Linux: Install signed .rpm agent package {{ install_agent_remote_pkg_path }}"
          ansible.builtin.package:
            name: "{{ install_agent_remote_pkg_path }}"
          when: install_agent_signed_package

    - name: "Block: DEB based systems"
      when: install_agent_pkg_format == "deb"
      block:
        - name: "Install gpg"
          ansible.builtin.apt:
            name: gpg
            update_cache: true

        - name: "Linux: Copy gpg key to remote server"
          ansible.builtin.copy:
            src: "{{ install_agent_gpg_key }}"
            dest: "{{ install_agent_remote_gpg_key_path }}"
            mode: "0644"

        - name: "Linux: Import GPG key for apt"
          ansible.builtin.apt_key:
            file: "{{ install_agent_remote_gpg_key_path }}"

        - name: "Linux: Install deb agent package {{ install_agent_remote_pkg_path }}"
          ansible.builtin.apt:
            deb: "{{ install_agent_remote_pkg_path }}"

- name: "Linux: Check if agent is already registered"
  ansible.builtin.shell:
    # \\s needed because yaml interprets \s as escape sequence
    cmd: "set -o pipefail && /opt/sentinelone/bin/sentinelctl management status | grep -E '^Connectivity\\s+(On|Off)$' | awk '{ print $2 }'"
    executable: "/bin/bash"
  become: true
  register: install_agent_agent_status
  failed_when: install_agent_agent_status.stdout is not regex("On|Off")
  changed_when: install_agent_agent_status.stdout is not regex("On|Off")

- name: "Linux: Register agent"
  ansible.builtin.command:
    cmd: '/opt/sentinelone/bin/sentinelctl management token set {{ install_agent_signed_package.json.data.token }}'
  become: true
  register: install_agent_token_set_output
  no_log: "{{ install_agent_hide_sensitive }}"
  changed_when: true
  failed_when: '"Registration token successfully set" not in install_agent_token_set_output.stdout'
  when: install_agent_agent_status.stdout == 'Off' or install_agent_lx_force_new_token

- name: "Linux: Start and enable service 'sentinelone' if neccessary"
  ansible.builtin.service:
    name: sentinelone
    state: started
    enabled: true
  become: true

- name: "Linux: Remove agent install package from target machine"
  ansible.builtin.file:
    path: "{{ install_agent_remote_pkg_path }}"
    state: absent
  become: true
  when: not install_agent_agent_installed

- name: "Linux: Remove gpg key from target machine"
  ansible.builtin.file:
    path: "{{ install_agent_remote_gpg_key_path }}"
    state: absent
  become: true
