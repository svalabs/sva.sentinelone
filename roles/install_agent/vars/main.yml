---
# vars file for install_agent
install_agent_pkg_format: "{% if ansible_facts.pkg_mgr | default([]) in ['yum', 'dnf', 'zypper', 'dnf5'] %}rpm{%
  elif ansible_facts.pkg_mgr | default('') == 'apt' %}deb{%
  elif ansible_facts.os_family | default('') == 'Windows' and not install_agent_win_use_exe %}msi{%
  elif ansible_facts.os_family | default('') == 'Windows' and install_agent_win_use_exe %}exe{%
  else %}unknown{% endif %}"
install_agent_pkg_arch: "{% if ansible_facts.architecture | regex_search('x86_64|64-bit') %}64_bit{%
  elif ansible_facts.architecture | regex_search('i386|32-bit') %}32_bit{%
  elif ansible_facts.architecture == 'aarch64' %}aarch64{%
  else %}unknown{% endif %}"
install_agent_custom_os_family: "{{ 'Windows' if install_agent_pkg_format | regex_search('msi|exe') else 'Linux' }}"
install_agent_api_url: "{{ install_agent_console_url }}/web/api/v2.1/"
install_agent_tmp_dir: "{% if ansible_os_family | lower == 'windows' %}C:\\Windows\\Temp\\{% else %}/tmp/{% endif %}"
