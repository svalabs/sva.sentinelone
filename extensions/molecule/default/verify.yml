---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    - name: Verify facts are collected
      ansible.builtin.assert:
        that:
          - ansible_facts is defined
        success_msg: "Verification passed"
        fail_msg: "Verification failed"

