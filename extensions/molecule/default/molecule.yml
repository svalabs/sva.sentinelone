---
platforms:
  - name: ubuntu-2404
    box: "bento/ubuntu-24.04"
    box_architecture: "${ARCH:-amd64}"
    memory: 2048
    cpus: 1
    config_options:
      ssh.keep_alive: true

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
    cleanup: cleanup.yml
  inventory:
    host_vars:
      ubuntu-2404:
        ansible_python_interpreter: /usr/bin/python3
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../roles"
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../.."
